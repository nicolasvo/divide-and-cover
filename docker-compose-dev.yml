services:
  api:
    build:
      context: .
      args:
        INSTALL_DEV: "1"
    container_name: dac-api-dev
    ports:
      - "127.0.0.1:8000:8000"
    env_file: .env
    environment:
      DAC_USE_MODAL: ${DAC_USE_MODAL:-1}
      DAC_TRACKS_DIR: /data/tracks
    volumes:
      - ./app:/app/app
      - ./tracks:/data/tracks
    command:
      - uv
      - run
      - --no-sync
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload

  frontend:
    image: node:22-bookworm-slim
    container_name: dac-frontend-dev
    working_dir: /app
    ports:
      - "127.0.0.1:5173:5173"
    environment:
      # Vite proxy target — reach the api container by service name over the compose network
      API_PROXY_TARGET: http://api:8000
    volumes:
      - ./frontend:/app
      # node_modules in a named volume so the host's arm64 mac binaries don't bleed
      # into the linux container (esbuild + swc would break otherwise)
      - dac_frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    depends_on:
      - api

volumes:
  dac_frontend_node_modules:
